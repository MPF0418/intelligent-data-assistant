<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V3.0 功能验证</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #667eea;
            text-align: center;
        }
        .status-card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .status-label {
            font-weight: bold;
            color: #333;
        }
        .status-value {
            color: #666;
        }
        .status-value.success {
            color: #28a745;
        }
        .status-value.error {
            color: #dc3545;
        }
        .test-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .test-btn:hover {
            background: #764ba2;
        }
        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
        }
        .log-info { color: #667eea; }
        .log-success { color: #4ec9b0; }
        .log-error { color: #f44747; }
        .log-warning { color: #dcdcaa; }
    </style>
</head>
<body>
    <h1>🚀 V3.0 功能验证页面</h1>
    
    <div class="status-card">
        <h2>模块加载状态</h2>
        <div id="module-status"></div>
    </div>
    
    <div class="status-card">
        <h2>功能测试</h2>
        <button class="test-btn" onclick="testChartRecommender()">测试图表推荐器</button>
        <button class="test-btn" onclick="testErrorCollector()">测试错误收集器</button>
        <button class="test-btn" onclick="testFeedbackManager()">测试反馈管理器</button>
        <button class="test-btn" onclick="testDataPreprocessor()">测试数据预处理器</button>
        <button class="test-btn" onclick="testAutoFixer()">测试自动修复器</button>
        <button class="test-btn" onclick="testAll()">全部测试</button>
    </div>
    
    <div class="status-card">
        <h2>系统日志</h2>
        <div class="log-container" id="log-container"></div>
    </div>
    
    <script type="module">
        // 导入 V3.0 模块
        import chartRecommender from './js/chartRecommender.js';
        import errorCollector from './js/errorCollector.js';
        import feedbackManager from './js/feedbackManager.js';
        import dataPreprocessor from './js/dataPreprocessor.js';
        import autoFixer from './js/autoFixer.js';
        import feedbackUI from './js/feedbackUI.js';
        import errorGuideUI from './js/errorGuideUI.js';
        
        // 暴露到全局
        window.chartRecommender = chartRecommender;
        window.errorCollector = errorCollector;
        window.feedbackManager = feedbackManager;
        window.dataPreprocessor = dataPreprocessor;
        window.autoFixer = autoFixer;
        window.feedbackUI = feedbackUI;
        window.errorGuideUI = errorGuideUI;
        
        // 日志函数
        window.log = function(message, type = 'info') {
            const logContainer = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        };
        
        // 检查模块加载
        function checkModuleStatus() {
            const modules = {
                '图表推荐器': window.chartRecommender,
                '错误收集器': window.errorCollector,
                '反馈管理器': window.feedbackManager,
                '数据预处理器': window.dataPreprocessor,
                '自动修复器': window.autoFixer,
                '反馈 UI': window.feedbackUI,
                '错误引导 UI': window.errorGuideUI
            };
            
            const container = document.getElementById('module-status');
            let html = '';
            
            for (const [name, module] of Object.entries(modules)) {
                const isLoaded = !!module;
                html += `
                    <div class="status-item">
                        <span class="status-label">${name}</span>
                        <span class="status-value ${isLoaded ? 'success' : 'error'}">
                            ${isLoaded ? '✅ 已加载' : '❌ 未加载'}
                        </span>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // 测试函数
        window.testChartRecommender = function() {
            try {
                if (!window.chartRecommender) throw new Error('模块未加载');
                
                const dataInfo = {
                    columns: ['省公司', '日期', '金额', '数量'],
                    rowCount: 100,
                    sampleData: []
                };
                
                const intent = { intent: 'QUERY_AGGREGATE', confidence: 0.85 };
                const recommendations = window.chartRecommender.recommend(dataInfo, intent, '统计各省金额');
                
                if (recommendations && recommendations.length > 0) {
                    window.log(`✅ 图表推荐器测试通过：推荐了 ${recommendations.length} 种图表`, 'success');
                    window.log(`   推荐：${recommendations.map(r => r.chartType).join(', ')}`, 'info');
                } else {
                    throw new Error('没有返回推荐结果');
                }
            } catch (error) {
                window.log(`❌ 图表推荐器测试失败：${error.message}`, 'error');
            }
        };
        
        window.testErrorCollector = function() {
            try {
                if (!window.errorCollector) throw new Error('模块未加载');
                
                const errorId = window.errorCollector.record(
                    new Error('测试错误'),
                    { userInput: '测试', module: 'test' }
                );
                
                if (errorId && errorId.startsWith('ERR_')) {
                    const stats = window.errorCollector.getStatistics();
                    window.log(`✅ 错误收集器测试通过：错误 ID=${errorId}, 总错误数=${stats.totalErrors}`, 'success');
                } else {
                    throw new Error('错误 ID 格式不正确');
                }
            } catch (error) {
                window.log(`❌ 错误收集器测试失败：${error.message}`, 'error');
            }
        };
        
        window.testFeedbackManager = function() {
            try {
                if (!window.feedbackManager) throw new Error('模块未加载');
                
                const feedback = window.feedbackManager.submitRating(5, 'test', '测试评分');
                
                if (feedback && feedback.type === 'rating' && feedback.score === 5) {
                    const stats = window.feedbackManager.generateStatistics();
                    window.log(`✅ 反馈管理器测试通过：平均分=${stats.averageRating}`, 'success');
                } else {
                    throw new Error('反馈提交失败');
                }
            } catch (error) {
                window.log(`❌ 反馈管理器测试失败：${error.message}`, 'error');
            }
        };
        
        window.testDataPreprocessor = function() {
            try {
                if (!window.dataPreprocessor) throw new Error('模块未加载');
                
                const testData = [
                    { 省公司：'广东', 金额：1500000 },
                    { 省公司：'北京', 金额：1300000 }
                ];
                
                const config = {
                    unitConversion: {
                        from: '元',
                        to: '万元',
                        formula: (v) => v / 10000,
                        decimalPlaces: 2
                    }
                };
                
                const result = window.dataPreprocessor.transform(testData, config, ['省公司', '金额']);
                
                if (result[0].金额 === 150) {
                    window.log(`✅ 数据预处理器测试通过：1500000 元 → ${result[0].金额}万元`, 'success');
                } else {
                    throw new Error(`转换结果错误：期望 150，实际 ${result[0].金额}`);
                }
            } catch (error) {
                window.log(`❌ 数据预处理器测试失败：${error.message}`, 'error');
            }
        };
        
        window.testAutoFixer = function() {
            try {
                if (!window.autoFixer) throw new Error('模块未加载');
                
                const rules = window.autoFixer.getRegisteredRules();
                const stats = window.autoFixer.getStatistics();
                
                if (rules && rules.length > 0) {
                    window.log(`✅ 自动修复器测试通过：已注册 ${rules.length} 条规则`, 'success');
                    window.log(`   统计：${JSON.stringify(stats)}`, 'info');
                } else {
                    throw new Error('没有注册任何规则');
                }
            } catch (error) {
                window.log(`❌ 自动修复器测试失败：${error.message}`, 'error');
            }
        };
        
        window.testAll = function() {
            window.log('=== 开始全部测试 ===', 'info');
            window.testChartRecommender();
            window.testErrorCollector();
            window.testFeedbackManager();
            window.testDataPreprocessor();
            window.testAutoFixer();
            window.log('=== 全部测试完成 ===', 'info');
        };
        
        // 页面加载完成后检查
        window.addEventListener('load', () => {
            setTimeout(() => {
                checkModuleStatus();
                window.log('V3.0 验证页面已加载', 'success');
                window.log('请点击测试按钮验证各模块功能', 'info');
            }, 500);
        });
    </script>
</body>
</html>
