# Cloudflare Tunnel 配置文件
# 用于同时暴露前端和后端API服务

tunnel: auto
credentials-file: ~/.cloudflared/<TUNNEL_ID>.json

ingress:
  # 后端API路由 - 匹配 /api/* 路径
  - hostname: <API_HOSTNAME>
    path: /api/*
    service: http://localhost:5001
  
  # 前端静态文件服务
  - hostname: <FRONTEND_HOSTNAME>
    service: http://localhost:8080
  
  # 默认路由
  - service: http_status:404
